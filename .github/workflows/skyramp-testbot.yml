name: Skyramp Testbot
on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  test-maintenance:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Skyramp Testbot
        uses: skyramp/testbot@shiny/test-recom-update
        with:
          skyramp_license_file: ${{ secrets.SKYRAMP_LICENSE }}
          anthropic_api_key: ${{ secrets.SKYRAMP_TESTBOT_API_KEY }}

          target_setup_command: './deployment-testbot/setup.sh'
          target_ready_check_command: 'curl -f http://localhost:4200/api/health'
          target_ready_check_timeout: 90
          auth_token_command: './deployment-testbot/get-token.sh'
          skyramp_mcp_version: next

          test_directory: 'tests'
          auto_commit: true
          post_pr_comment: true
          enable_debug: true
          commit_message: 'TestBot: update tests for Prefect'
